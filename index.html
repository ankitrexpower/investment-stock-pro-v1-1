<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>INVESTMENT STOCK PRO V1.1</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#07111f;--card:#101a2e;--line:#26344d;--txt:#f5f7fb;--muted:#9da8bc;--green:#22c55e;--yellow:#facc15}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;padding:20px}.title{font-size:28px;font-weight:800}.sub{color:var(--muted);margin-top:6px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.num{font-size:28px;font-weight:800}.lbl{color:var(--muted)}button{width:100%;border:0;border-radius:14px;padding:15px;font-weight:800;background:var(--green);color:#07111f;font-size:16px}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}.tab{padding:14px;border:1px solid var(--line);border-radius:14px;text-align:center;font-weight:800}.tab.active{background:#1d2a40}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--muted)}.badge{background:#554a12;color:var(--yellow);border-radius:999px;padding:6px 10px;font-weight:800}.err{color:#f87171}.small{font-size:13px;color:var(--muted)}@media(max-width:600px){.title{font-size:24px}.grid{grid-template-columns:1fr 1fr}body{padding:14px}}
</style>
</head>
<body>
<div class="title">INVESTMENT STOCK PRO V1.1</div>
<div class="sub">FII+DII ≥ 5% • D/W/M • Close &gt; SMA121 • CCI ≤ -192</div>
<div class="card">
<button onclick="scan()">Live Scan</button>
<div id="msg" class="small" style="margin-top:12px">Backend URL set in app.js</div>
</div>
<div class="grid">
<div class="card"><div class="num" id="total">0</div><div class="lbl">Total Stocks</div></div>
<div class="card"><div class="num" id="qualified">0</div><div class="lbl">FII+DII ≥5%</div></div>
<div class="card"><div class="num" id="setup">0</div><div class="lbl">Total Setup</div></div>
<div class="card"><div class="num" id="last">--</div><div class="lbl">Last Scan</div></div>
</div>
<div class="tabs"><div class="tab active" onclick="show('D',this)">Daily</div><div class="tab" onclick="show('W',this)">Weekly</div><div class="tab" onclick="show('M',this)">Monthly</div></div>
<div class="card"><table><thead><tr><th>Stock</th><th>FII+DII</th><th>CCI</th><th>Status</th></tr></thead><tbody id="rows"><tr><td colspan="4">Live Scan dabao.</td></tr></tbody></table></div>
<script src="app.js"></script>
</body>
</html>
