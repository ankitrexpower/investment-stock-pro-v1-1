<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>INVESTMENT STOCK PRO V2.0</title><style>
body{font-family:Arial;background:#07111f;color:#fff;margin:0;padding:18px}.card{background:#101b2d;border:1px solid #26354f;border-radius:16px;padding:16px;margin:14px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.kpi{font-size:28px;font-weight:700}.muted{color:#9aa7bb}.btn{width:100%;padding:15px;border:0;border-radius:14px;background:#22c55e;font-weight:700;font-size:16px}table{width:100%;border-collapse:collapse}td,th{padding:10px;border-bottom:1px solid #26354f;text-align:left}.badge{background:#7a6200;color:#ffe66b;padding:6px 10px;border-radius:20px;font-weight:700}.small{font-size:12px}</style></head><body>
<h1>INVESTMENT STOCK PRO V2.0</h1><div class="muted">FII+DII ≥ 5% • D/W/M • Close &gt; SMA121 • CCI ≤ -192</div>
<div class="card"><button class="btn" onclick="sampleScan()">Run Sample Live Scan</button><p class="muted small">CSV upload columns: Stock,FII,DII</p><input type="file" id="csv" accept=".csv"><button class="btn" style="margin-top:10px" onclick="uploadScan()">Upload CSV & Scan</button></div>
<div class="grid"><div class="card"><div class="kpi" id="total">0</div><div class="muted">Total Stocks</div></div><div class="card"><div class="kpi" id="qualified">0</div><div class="muted">FII+DII ≥5%</div></div><div class="card"><div class="kpi" id="setup">0</div><div class="muted">Total Setup</div></div><div class="card"><div class="kpi" id="time">--</div><div class="muted">Last Scan</div></div></div>
<div class="card"><table><thead><tr><th>Stock</th><th>TF</th><th>FII+DII</th><th>CCI</th><th>Status</th></tr></thead><tbody id="rows"><tr><td colspan="5" class="muted">Run scan karo.</td></tr></tbody></table></div>
<script>
const API = location.origin;
function draw(data){document.getElementById('total').textContent=data.total_stocks||0;document.getElementById('qualified').textContent=data.qualified_stocks||0;document.getElementById('setup').textContent=data.total_setup||0;document.getElementById('time').textContent=new Date().toLocaleTimeString();let rows=data.setups||[];document.getElementById('rows').innerHTML=rows.length?rows.map(r=>`<tr><td><b>${r.stock}</b></td><td>${r.tf}</td><td>${r.total_holding}%</td><td>${r.cci}</td><td><span class="badge">SETUP</span></td></tr>`).join(''):'<tr><td colspan="5" class="muted">No setup found.</td></tr>'}
async function sampleScan(){document.getElementById('rows').innerHTML='<tr><td colspan="5">Scanning...</td></tr>';draw(await (await fetch(API+'/sample-scan')).json())}
async function uploadScan(){let f=document.getElementById('csv').files[0];if(!f){alert('CSV select karo');return}let fd=new FormData();fd.append('file',f);draw(await (await fetch(API+'/scan-csv',{method:'POST',body:fd})).json())}
</script></body></html>
